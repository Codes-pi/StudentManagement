<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Dashboard</title>
    <!-- This links to the CSS Tailwind is about to build -->
    <link href="./public/output.css" rel="stylesheet">
</head>
<body class="bg-[#1a1a2e] text-gray-300 h-screen flex font-sans overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-[#16213e] p-6 border-r border-gray-700">
        <h2 class="text-white font-bold mb-8 text-xl">MCA Attendance</h2>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-8 bg-[#16213e] p-4 rounded-2xl shadow-lg">
            <h1 class="text-xl font-bold text-white">Today's Session</h1>
        </header>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    
    <div class="bg-[#16213e] p-5 rounded-2xl border border-gray-700 shadow-xl group hover:border-purple-500 transition-all duration-300">
        <div class="flex justify-between items-start mb-4">
            <div class="p-3 bg-blue-500/10 rounded-lg text-blue-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </div>
            <span class="text-xs font-medium text-gray-500 tracking-wider">TOTAL</span>
        </div>
        <h3 class="text-2xl font-bold text-white mb-1">120</h3>
        <p class="text-sm text-gray-400">Enrolled Students</p>
    </div>

    <div class="bg-[#16213e] p-5 rounded-2xl border border-gray-700 shadow-xl group hover:border-green-500 transition-all duration-300">
        <div class="flex justify-between items-start mb-4">
            <div class="p-3 bg-green-500/10 rounded-lg text-green-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <span class="text-xs font-medium text-gray-500 tracking-wider">PRESENT</span>
        </div>
        <h3 class="text-2xl font-bold text-white mb-1">98</h3>
        <div class="w-full bg-gray-700 h-1.5 rounded-full mt-2">
            <div class="bg-green-500 h-1.5 rounded-full w-[81%] shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
        </div>
    </div>

    <div class="bg-[#16213e] p-5 rounded-2xl border border-gray-700 shadow-xl group hover:border-red-500 transition-all duration-300">
        <div class="flex justify-between items-start mb-4">
            <div class="p-3 bg-red-500/10 rounded-lg text-red-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <span class="text-xs font-medium text-gray-500 tracking-wider">ABSENT</span>
        </div>
        <h3 class="text-2xl font-bold text-white mb-1">22</h3>
        <p class="text-sm text-red-400 font-medium mt-1">- 12% from yesterday</p>
    </div>

    <div class="bg-[#16213e] p-5 rounded-2xl border border-gray-700 shadow-xl group hover:border-purple-500 transition-all duration-300">
        <div class="flex justify-between items-start mb-4">
            <div class="p-3 bg-purple-500/10 rounded-lg text-purple-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <span class="text-xs font-medium text-gray-500 tracking-wider">AVG RATE</span>
        </div>
        <h3 class="text-2xl font-bold text-white mb-1">81.6%</h3>
        <p class="text-sm text-gray-400">Monthly Average</p>
    </div>

</div>



        <div class="bg-[#16213e] p-6 rounded-2xl border border-gray-700">
            <p>Your student list will go here!</p>
        </div>
    </main>

</body>
</html>
